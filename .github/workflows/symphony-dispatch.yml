# =============================================================================
# Symphony Dispatch (核心ワークフロー)
# -----------------------------------------------------------------------------
# 用途:
#   GitHub Issue に `claude-task` ラベルが付いたタイミング、または
#   `symphony-decompose.yml` から `gh workflow run` で呼び出されたタイミングで
#   Claude Code エージェントを自動起動し、Issue 駆動で実装〜PR 作成まで自走させる。
#
# トリガー:
#   1. issues.labeled (claude-task) — 人間 / 信頼アクターによるラベル付与
#   2. workflow_dispatch (issue_number) — symphony-decompose.yml からの起動
#      [GITHUB_TOKEN で起こした issues.labeled は後続 workflow を起動しないため、
#       decompose は workflow_dispatch を介して dispatch を呼ぶ]
#
# ステートマシン:
#   [claude-task] → [claude-in-progress] → [claude-review] / [claude-failed]
#
# セキュリティ要点 (公式ドキュメント準拠):
#   - Issue title/body は env: 経由でのみ参照 (prompt injection / コマンド
#     インジェクション対策)
#   - permissions は最小権限のみ宣言
#   - --allowedTools で Claude が触れるツールを明示的に絞る
#   - GITHUB_TOKEN (短命) を利用、PAT は使わない
# =============================================================================
name: Symphony Dispatch

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "実装対象の Issue 番号 (symphony-decompose.yml からの起動時に指定)"
        required: true
        type: string

# 最小権限の原則
permissions:
  contents: write        # コード変更・ブランチ作成
  issues: write          # ラベル更新・コメント追加
  pull-requests: write   # PR 作成
  id-token: write        # OIDC token exchange (GitHub App 認証)

jobs:
  dispatch:
    # claude-task ラベルが付いたとき、または workflow_dispatch から呼ばれたときのみ起動
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'claude-task') ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # -----------------------------------------------------------------------
      # Step 0: Issue 情報を解決 (両トリガー共通)
      # workflow_dispatch から呼ばれた場合は inputs.issue_number、
      # issues.labeled の場合は github.event.issue.* を使う。
      # -----------------------------------------------------------------------
      - name: Resolve issue context
        id: issue
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          if [ -z "${ISSUE_NUMBER:-}" ]; then
            echo "::error::issue_number が解決できません"
            exit 1
          fi
          # Issue 詳細を取得 (title/body はマルチライン対応で GITHUB_OUTPUT へ)
          json=$(gh issue view "$ISSUE_NUMBER" --repo "$REPO" --json number,title,body)
          {
            echo "number=$(jq -r .number <<<"$json")"
            printf 'title<<ISSUE_TITLE_EOF\n%s\nISSUE_TITLE_EOF\n' "$(jq -r .title <<<"$json")"
            printf 'body<<ISSUE_BODY_EOF\n%s\nISSUE_BODY_EOF\n' "$(jq -r .body <<<"$json")"
          } >> "$GITHUB_OUTPUT"

      # -----------------------------------------------------------------------
      # Step 1: ラベルを in-progress に遷移し、開始コメントを投稿
      # decompose 経由で来たケースでは triage-A も併せて剥がす。
      # -----------------------------------------------------------------------
      - name: Mark as in-progress
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          # claude-task / triage-A はあれば剥がす (どちらか / 両方付いている可能性)
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --remove-label "claude-task" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --remove-label "triage-A" 2>/dev/null || true
          gh issue edit "$ISSUE_NUMBER" --repo "$GITHUB_REPOSITORY" \
            --add-label "claude-in-progress"
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '🤖 Claude Code エージェントが作業を開始しました。\n\nGHA 実行ログ: %s' "$RUN_URL")"

      # -----------------------------------------------------------------------
      # Step 2: リポジトリのチェックアウト (フル履歴 = ブランチ作成のため)
      # -----------------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # -----------------------------------------------------------------------
      # Step 3: Claude Code Action 実行
      # -----------------------------------------------------------------------
      # 【重要】Issue title / body は必ず env: で受け取り、prompt 内では
      #         ${{ env.* }} で参照する。run: ブロックで直接展開すると
      #         コマンドインジェクションのリスクがある。
      # -----------------------------------------------------------------------
      - name: Run Claude Code Agent
        id: claude
        uses: anthropics/claude-code-action@v1
        env:
          ISSUE_TITLE:  ${{ steps.issue.outputs.title }}
          ISSUE_BODY:   ${{ steps.issue.outputs.body }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Decompose → Dispatch chain (workflow_dispatch 経由) では trigger actor が
          # github-actions[bot] になり、claude-code-action のデフォルト bot ガードに
          # 弾かれる。internal な chain trigger を許可するため明示的に allow する。
          allowed_bots: "github-actions"
          prompt: |
            あなたは Issue 駆動の自律コーディングエージェントです。
            以下の Issue を分析し、実装・修正を行い、PR を作成してください。

            ## Issue 情報
            番号: ${{ env.ISSUE_NUMBER }}
            タイトル: ${{ env.ISSUE_TITLE }}
            内容:
            ${{ env.ISSUE_BODY }}

            ## 作業ルール
            1. **CLAUDE.md を必ず最初に読んでプロジェクトのルールを把握すること**
            2. 実装前にリポジトリ全体の関連コードを Glob/Grep で調査・理解すること
            3. docs/adr/ に既存の ADR があれば確認し、過去の決定と矛盾しないこと
            4. テストが存在する場合は必ず実行し、パスを確認すること
            5. ブランチ名は `claude/issue-${{ env.ISSUE_NUMBER }}` とすること
            6. PR 作成時に "Closes #${{ env.ISSUE_NUMBER }}" を本文に含めること
            7. 不明点があれば Issue にコメントして作業を停止すること (推測で進めない)
            8. 完了後、この Issue に作業サマリ (変更内容・テスト結果) をコメントすること

          claude_args: |
            --max-turns 30
            --model claude-sonnet-4-6
            --allowedTools "Edit,Read,Write,Bash,Glob,Grep,mcp__github__create_pull_request,mcp__github__create_branch,mcp__github__get_issue,mcp__github__add_issue_comment"
          additional_permissions: "actions: read"

      # -----------------------------------------------------------------------
      # Step 4: Claude の成果物を検証
      # claude-code-action は内部エラーが無くても commit を一切作らずに
      # success で終わることがあるため、ブランチに main を超える commit が
      # 存在するか、または該当ブランチから PR が立っているかを必ず確認する。
      # どちらも無い場合は exit 1 して、Step 6 (Mark as failed) に流す。
      # -----------------------------------------------------------------------
      - name: Verify Claude produced output
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail
          BRANCH="claude/issue-${ISSUE_NUMBER}"

          git fetch origin main "$BRANCH" 2>/dev/null || true

          HAS_COMMITS=0
          if git rev-parse --verify "origin/$BRANCH" >/dev/null 2>&1; then
            AHEAD=$(git rev-list --count "origin/main..origin/$BRANCH")
            if [ "$AHEAD" -gt 0 ]; then
              HAS_COMMITS=1
              echo "✓ Branch $BRANCH is ahead of main by $AHEAD commit(s)"
            fi
          fi

          HAS_PR=0
          PR_COUNT=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" --json number --jq 'length')
          if [ "$PR_COUNT" -gt 0 ]; then
            HAS_PR=1
            echo "✓ Found $PR_COUNT PR(s) from branch $BRANCH"
          fi

          if [ "$HAS_COMMITS" -eq 0 ] && [ "$HAS_PR" -eq 0 ]; then
            echo "::error::Claude did not produce any commits or pull request on $BRANCH. Marking as failed."
            exit 1
          fi
          echo "Verification passed (commits=$HAS_COMMITS, PR=$HAS_PR)"

      # -----------------------------------------------------------------------
      # Step 5: bot author PR で CodeRabbit 自動レビューが skip される問題への対処
      # ADR-001 (#24): claude-code-action が作る PR は author=app/claude (bot) で、
      # CodeRabbit は default で bot author を auto-review しない。
      # PR 上に @coderabbitai review コメントを投稿して手動トリガーする。
      #
      # 【scaffold 純粋性】このステップは導入先で `.coderabbit.yaml` または
      # `.coderabbit.yml` が存在する場合にのみ発火する (条件付き opt-in)。
      # CodeRabbit を使っていない repo ではコメントノイズを出さないために
      # hashFiles で両方の拡張子を存在チェックする。
      # -----------------------------------------------------------------------
      - name: Trigger CodeRabbit review on PR
        if: success() && (hashFiles('.coderabbit.yaml') != '' || hashFiles('.coderabbit.yml') != '')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          set -euo pipefail
          BRANCH="claude/issue-${ISSUE_NUMBER}"
          PR_NUMBER=$(gh pr list --repo "$GITHUB_REPOSITORY" --head "$BRANCH" \
            --json number --jq '.[0].number // empty')
          if [ -z "$PR_NUMBER" ]; then
            echo "::warning::PR not found on branch $BRANCH; skipping CodeRabbit trigger."
            exit 0
          fi
          # 改行を含む本文は printf で実改行を生成 (CLAUDE.md の workflow 規約)。
          # 現状は単一行だが、将来の拡張で安全な形を維持する。
          BODY=$(printf '%s\n' '@coderabbitai review')
          gh pr comment "$PR_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$BODY"
          echo "::notice::Triggered CodeRabbit review on PR #${PR_NUMBER}"

      # -----------------------------------------------------------------------
      # Step 6: 成功時 → review ラベルへ遷移
      # -----------------------------------------------------------------------
      - name: Mark as review (on success)
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "claude-in-progress" \
            --add-label "claude-review"

      # -----------------------------------------------------------------------
      # Step 7: 失敗時 → failed ラベルへ遷移し、人間にエスカレーション
      # -----------------------------------------------------------------------
      - name: Mark as failed (on failure)
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ steps.issue.outputs.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          gh issue edit "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --remove-label "claude-in-progress" \
            --add-label "claude-failed" 2>/dev/null || true
          gh issue comment "$ISSUE_NUMBER" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$(printf '⚠️ エージェントの実行が失敗しました。\n\nGHA 実行ログ: %s\n\n人間による確認が必要です。' "$RUN_URL")"

      # -----------------------------------------------------------------------
      # Step 8: Claude execution log の artifact upload (常時実行)
      # 失敗・成功問わず Claude 内部のターン詳細・拒否事由を保管。
      # 30 日間保持し `gh run download` で取得可能。
      # -----------------------------------------------------------------------
      - name: Upload Claude execution log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: claude-execution-log-dispatch-${{ github.run_id }}
          path: /home/runner/work/_temp/claude-execution-output.json
          retention-days: 30
          if-no-files-found: ignore
